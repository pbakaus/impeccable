name: Design scan (example)
on:
  workflow_dispatch: {}
permissions:
  security-events: write
  contents: read
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./ # uses this repo's action.yml
        id: imp
        with:
          path: 'demos'
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.imp.outputs.sarif-file }}
